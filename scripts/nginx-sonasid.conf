# Nginx optionnel : même origine (port 80) pour UI + API → plus de CORS ni mauvais port.
# Sur la VM :
#   sudo cp scripts/nginx-sonasid.conf /etc/nginx/sites-available/sonasid
#   sudo ln -sf /etc/nginx/sites-available/sonasid /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Puis mettre dans frontend/.env.production :
#   VITE_API_BASE=http://135.236.108.108
# et npm run build

server {
    listen 80;
    server_name 135.236.108.108 sonasid-alexsys.westeurope.cloudapp.azure.com;

    location / {
        proxy_pass http://127.0.0.1:5175;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
    }

    location ~ ^/(auth|chat|healthz|conversations|db)/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
