# Sonasid — nginx reverse proxy (UI :5175 + API :8001, même origine).
# Déployer sur la VM : bash scripts/vm_setup_nginx.sh

# HTTP domaine → HTTPS (micro + cookies sécurisés)
server {
    listen 80;
    server_name sonasid-alexsys.westeurope.cloudapp.azure.com;
    return 301 https://$host$request_uri;
}

# HTTP IP (sans certificat — accès direct par IP)
server {
    listen 80;
    server_name 135.236.108.108;

    location / {
        proxy_pass http://127.0.0.1:5175;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(auth|chat|healthz|conversations|db)/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

# HTTPS (Let's Encrypt — requis pour le micro)
server {
    listen 443 ssl;
    server_name sonasid-alexsys.westeurope.cloudapp.azure.com;

    ssl_certificate /etc/letsencrypt/live/sonasid-alexsys.westeurope.cloudapp.azure.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sonasid-alexsys.westeurope.cloudapp.azure.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:5175;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ~ ^/(auth|chat|healthz|conversations|db)/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }
}
